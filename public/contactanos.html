<head>

<link rel="icon" type="image/png" href="/A_I-04.png" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Bebas Neue',sans-serif;background:#000;color:#fff}
a{text-decoration:none;color:inherit}

header{position:fixed;top:0;width:100%;z-index:999;background:rgba(0,0,0,.92);border-bottom:1px solid rgba(255,255,255,.12)}
nav{max-width:1400px;margin:auto;padding:12px 40px;display:flex;justify-content:space-between;align-items:center}
nav img{width:55px}
.menu{display:flex;gap:40px;color:white;text-transform:uppercase;letter-spacing:.18em;font-size:15px}

.contacto{min-height:100vh;padding:150px 5vw 80px;display:flex;align-items:center}
.container{width:100%;max-width:1500px;margin:auto;display:grid;grid-template-columns:1fr .95fr;gap:80px;align-items:start}

.label{font-size:22px;letter-spacing:.45em;text-transform:uppercase}
h1{margin-top:55px;font-size:clamp(5rem,8vw,9rem);line-height:.9;text-transform:uppercase}
.descripcion{margin-top:70px;max-width:760px;font-size:clamp(2rem,2.4vw,3rem);line-height:1.25;color:rgba(255,255,255,.65);text-transform:uppercase}

form{background:#fff;color:#000;padding:60px 55px}
label{display:block;margin-bottom:42px}
label span{display:block;margin-bottom:18px;font-size:1.6rem;letter-spacing:.22em;text-transform:uppercase}
input,textarea{width:100%;border:1px solid #000;padding:22px 25px;font-size:1.8rem;font-family:inherit;text-transform:uppercase;letter-spacing:.12em}
textarea{resize:none;min-height:300px}
button{width:100%;background:#000;color:#fff;border:none;padding:22px 40px;cursor:pointer;text-transform:uppercase;letter-spacing:.25em;font-family:inherit;font-size:1.4rem}
#resultado{margin-top:25px;font-size:1.3rem;color:#000}

footer{border-top:1px solid rgba(255,255,255,.12);padding:30px 40px}
.footer{max-width:1400px;margin:auto;display:flex;justify-content:space-between;align-items:center}
.footer img{width:55px}

@media(max-width:900px){
  .menu{display:none}
  .contacto{padding:120px 24px 70px}
  .container{grid-template-columns:1fr;gap:50px}
  form{padding:35px 25px}
}
</style>
</head>

<body>

<header>
<nav>
<a href="/"><img src="/A_I-04.png" alt="Adultxs Inexpertxs"></a>
<div class="menu">
<a href="/nosotroxs.html">Nosotrxs</a>
<a href="/colaboraciones.html">Colaboraciones</a>
<a href="/cositas.html">Cositas</a>
<a href="/contactanos.html">Contáctanos</a>
</div>
</nav>
</header>

<section class="contacto">
<div class="container">

<div>
<p class="label">Contáctanos</p>
<h1>Hablemos de tu proyecto</h1>
<p class="descripcion">
Nos emociona conocer nuevos talentos y personas con propuestas que van a cambiar las cosas.
</p>
</div>

<form id="contactForm">
<input type="hidden" name="access_key" value="f557396b-07a3-479c-89f6-69012c3a9aee" />

<label>
<span>Nombre</span>
<input type="text" name="name" placeholder="Tu nombre" required>
</label>

<label>
<span>Correo</span>
<input type="email" name="email" placeholder="tu@correo.com" required>
</label>

<label>
<span>Mensaje</span>
<textarea name="message" placeholder="Cuéntanos qué traes entre manos" required></textarea>
</label>

<button type="submit">Enviar mensaje</button>
<div id="resultado"></div>
</form>

</div>
</section>

<footer>
<div class="footer">
<a href="/"><img src="/A_I-04.png" alt="Adultxs Inexpertxs"></a>
<span>© 2026 Adultxs Inexpertxs</span>
<a href="https://www.instagram.com/adultxs_inexpertxs/" target="_blank">Instagram</a>
</div>
</footer>

<script>
const form = document.getElementById("contactForm");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const data = new FormData(form);

  const response = await fetch("https://api.web3forms.com/submit", {
    method:"POST",
    body:data
  });

  const result = await response.json();
  const mensaje = document.getElementById("resultado");

  if(result.success){
    mensaje.innerHTML = "Mensaje enviado correctamente.";
    form.reset();
  }else{
    mensaje.innerHTML = "Hubo un problema al enviar el mensaje.";
  }
});
</script>

</body>
</html>
